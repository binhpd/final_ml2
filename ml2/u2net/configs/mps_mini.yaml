# Smoke test cấu hình - chạy nhanh trên dummy data, kiểm tra code không lỗi
name: u2netp_mini

model:
  arch: U2NETp
  in_channels: 3
  out_channels: 1

data:
  roots:
    - ml2/data/dummy
  image_size: 192
  augmentation: basic
  num_workers: 0

train:
  device: mps
  epochs: 2
  batch_size: 4
  optimizer: adam
  lr: 0.001
  weight_decay: 0.0
  betas: [0.9, 0.999]
  scheduler: none
  warmup_epochs: 0
  grad_clip: 1.0
  amp: false

loss:
  w_bce: 1.0
  w_iou: 1.0
  w_ssim: 1.0
  w_edge: 0.0

checkpoint:
  out_dir: ml2/checkpoints
  save_every: 1
  save_best: true
  resume: null

log:
  tb_dir: ml2/runs/u2netp_mini
  print_every: 5

pretrain:
  enabled: false
